<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar sesión</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="css/base.css" />
    <link rel="stylesheet" href="css/auth.css" />
  </head>
  <body>
    <main class="auth-page">
      <div class="container container--sm auth-container">
        <section class="auth-card card">
          <header class="auth-header">
            <p class="label">Plataforma</p>
            <h1 class="text-display">Iniciar sesión</h1>
            <p class="text-muted">Accedé con tu correo y contraseña.</p>
          </header>

          <form class="auth-form" action="#" method="post">
            <div class="form-group">
              <label class="form-label" for="email">Correo</label>
              <input
                class="form-input"
                type="email"
                id="email"
                name="email"
                placeholder="tu@correo.com"
                autocomplete="email"
                required
              />
            </div>

            <div class="form-group">
              <div class="auth-row">
                <label class="form-label" for="password">Contraseña</label>
                <a class="text-sm auth-link" href="#">¿Olvidaste tu contraseña?</a>
              </div>
              <input
                class="form-input"
                type="password"
                id="password"
                name="password"
                placeholder="••••••••"
                autocomplete="current-password"
                required
              />
            </div>

            <button class="btn btn--primary btn--full" type="submit">Entrar</button>
          </form>

          <footer class="auth-footer">
            <p class="text-sm text-muted">¿No tenés cuenta?</p>
            <a class="btn btn--secondary btn--sm" href="register.html">Crear cuenta</a>
          </footer>
        </section>
      </div>
    </main>
  </body>
</html>
