<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Iniciar sesión</title>

    <meta name="google-client-id" content="918106144440-gkli1488vh96c8krpf83v9vo930v605q.apps.googleusercontent.com" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=Roboto+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="../../css/core/base.css?v=1.1" />
    <link rel="stylesheet" href="../../css/pages/auth.css?v=1.1" />

    <script src="../../js/services/theme.js?v=1.1"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="../../js/core/validations.js" defer></script>
  </head>
  <body>
    <main class="auth-page">
      <div class="container container--sm auth-container">
        <section class="auth-card card">
          <header class="auth-header">
            <p class="label">Plataforma</p>
            <h1 class="text-display auth-title--nowrap">Iniciar sesión</h1>
            <p class="text-muted">Accedé con tu correo y contraseña.</p>
          </header>

          <form class="auth-form" id="loginForm" action="#" method="post" novalidate>
            <div class="alert alert--error" id="loginAlert" role="alert" hidden>
              Correo o contraseña incorrectos.
            </div>

            <div class="form-group">
              <label class="form-label" for="email">Correo</label>
              <input
                class="form-input"
                type="email"
                id="email"
                name="email"
                placeholder="tu@correo.com"
                autocomplete="email"
                required
              />
              <p class="form-error" id="emailError" aria-live="polite"></p>
            </div>

            <div class="form-group">
              <div class="auth-row">
                <label class="form-label" for="password">Contraseña</label>
                <a class="text-sm auth-link" href="#">¿Olvidaste tu contraseña?</a>
              </div>
              <input
                class="form-input"
                type="password"
                id="password"
                name="password"
                placeholder="••••••••"
                autocomplete="current-password"
                required
              />
              <p class="form-error" id="passwordError" aria-live="polite"></p>
            </div>

            <button class="btn btn--primary btn--full" type="submit">Entrar</button>

            <div style="margin-top: var(--space-5)">
              <p class="text-sm text-muted" style="text-align: center; margin-bottom: var(--space-3)">
                o continuá con
              </p>
              <div id="googleLoginButton" style="display: flex; justify-content: center"></div>
              <p class="text-xs text-muted" id="googleLoginHint" style="text-align: center; margin-top: var(--space-2)" hidden>
                Falta configurar el Client ID de Google.
              </p>
            </div>
          </form>

          <footer class="auth-footer">
            <p class="text-sm text-muted">¿No tenés cuenta?</p>
            <a class="btn btn--secondary btn--sm" href="register.html">Crear cuenta</a>
          </footer>

          <div class="mt-4 text-center">
            <a class="text-sm auth-link" href="../../index.html">Volver al inicio</a>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
