<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mis postulaciones</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=Roboto+Mono:wght@400;500;600;700&display=swap"
      rel="stylesheet"
    />

    <link rel="stylesheet" href="../../css/base.css?v=1.1" />
    <link rel="stylesheet" href="../../css/components.css?v=1.1" />
    <link rel="stylesheet" href="../../css/candidate-pages.css?v=1.0" />

    <script src="../../utils/theme.js?v=1.1"></script>
    <script src="../../js/components.js?v=1.2" defer></script>
    <script src="../../js/candidato-postulaciones.js?v=1.1" defer></script>
  </head>

  <body class="candidate-page candidate-page--applications">
    <div id="navbar-placeholder"></div>

    <main class="page-wrapper">
      <section class="section section--sm">
        <div class="container">
          <div class="card candidate-hub candidate-hub--applications">
            <div class="card__body">
              <div class="candidate-hub__top">
                <div class="candidate-hub__title-wrap">
                  <div class="label">Candidato</div>
                  <h1 class="card__title candidate-hub__title">Mis postulaciones</h1>
                </div>
                <span class="badge badge--neutral candidate-hub__count" id="applicationsCount">0</span>
              </div>

              <p class="text-sm text-muted candidate-hub__intro">Acá podés visualizar las ofertas a las que te postulaste y revisar su estado actual.</p>

              <div class="candidate-hub__panel">
                <div id="candidateDashboardAlert" class="alert alert--info flex-col" hidden>
                  <strong>Necesitás iniciar sesión como candidato.</strong>
                  <span class="text-sm text-muted">Para ver tus postulaciones, primero iniciá sesión.</span>
                  <div style="margin-top: var(--space-3)">
                    <a class="btn btn--primary btn--sm" href="../auth/login.html">Ir a login</a>
                  </div>
                </div>

                <div id="applicationsList" class="applications-panel"></div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="footer-placeholder"></div>
  </body>
</html>
