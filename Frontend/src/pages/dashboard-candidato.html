<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel candidato</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=Roboto+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="../css/base.css" />
    <link rel="stylesheet" href="../css/components.css" />

    <script src="../js/components.js" defer></script>
    <script src="../js/candidato-postulaciones.js" defer></script>
  </head>
  <body>
    <div id="navbar-placeholder"></div>

    <main class="page-wrapper">
      <section class="section section--sm">
        <div class="container">
          <div class="card">
            <div class="card__body">
              <div class="flex items-center justify-between" style="margin-bottom: var(--space-4)">
                <h1 class="card__title">Panel de candidato</h1>
              </div>
              <p>
                Este perfil está pensado para candidatos: subir tu currículum y postularte a
                trabajos.
              </p>

              <div id="candidateDashboardAlert" class="alert alert--info flex-col" hidden style="margin-top: var(--space-6)">
                <strong>Necesitás iniciar sesión como candidato.</strong>
                <span class="text-sm text-muted">Para postularte, primero iniciá sesión.</span>
                <div style="margin-top: var(--space-3)">
                  <a class="btn btn--primary btn--sm" href="../login.html">Ir a login</a>
                </div>
              </div>
            </div>
          </div>

          <div class="grid" style="margin-top: var(--space-6); grid-template-columns: minmax(0, 1fr) minmax(0, 3fr); align-items: start">
            <div class="card" style="padding: var(--space-4); min-width: 0">
              <div class="card__body">
                <div class="flex items-center justify-between" style="margin-bottom: var(--space-3)">
                  <h2 class="card__title" style="font-size: var(--text-base)">Mis postulaciones</h2>
                  <span class="badge badge--neutral" id="applicationsCount">0</span>
                </div>
                <div id="applicationsList"></div>
              </div>
            </div>

            <div class="card" style="min-width: 0">
              <header class="card__header">
                <div class="flex flex-col" style="gap: var(--space-1)">
                  <span class="label">Explorá</span>
                  <h2 class="card__title" style="font-size: var(--text-xl)">Ofertas disponibles</h2>
                </div>
                <span class="badge badge--accent" id="offersCount">0</span>
              </header>
              <div class="card__body">
                <div id="offersList"></div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="footer-placeholder"></div>
  </body>
</html>
