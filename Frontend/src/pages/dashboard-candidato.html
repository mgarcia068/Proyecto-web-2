<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Panel candidato</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=Roboto+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="css/components.css" />

    <script src="js/components.js" defer></script>

    <div id="navbar-placeholder"></div>

    <main class="page-wrapper">
      <section class="section section--sm">
        <div class="container">
          <div class="card">
            <header class="card__header">
              <h1 class="card__title">Panel de candidato</h1>
              <a class="btn btn--secondary btn--sm" href="index.html">Ir al inicio</a>

            <div class="card__body">
              <p>
                Este perfil está pensado para candidatos: subir tu currículum y postularte a
                trabajos.
              </p>
              <p class="text-sm text-muted" style="margin-top: var(--space-3)">
                (Por ahora es un panel base: el rol viene del registro y se usa para la
                redirección al iniciar sesión.)
              </p>
            </div>
          </div>
        </div>
      </section>
    </main>

    <div id="footer-placeholder"></div>
