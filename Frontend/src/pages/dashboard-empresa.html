<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TalentIQ &mdash; Dashboard Empresa</title>
   <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>    
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=Roboto+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="../css/base.css" />
  <link rel="stylesheet" href="../css/components.css" />
  <link rel="stylesheet" href="../css/dashboard/dashboard.css" />
  <link rel="stylesheet" href="../css/dashboard/dashboard-sidebar.css" />
</head>
<body class="dashboard-page">

  <div class="db-layout">

    <aside class="sidebar" id="sidebar">

      <div class="sidebar__header">
        <a href="../index.html" class="sidebar__logo">Apply<span>AI</span></a>
        <button class="sidebar__collapse-btn" id="sidebar-collapse" aria-label="Colapsar sidebar">
          <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="15 18 9 12 15 6"></polyline>
          </svg>
        </button>
      </div>

      <a href="perfil-empresa-publico.html" class="sidebar__empresa sidebar__empresa--link" title="Ver perfil público">
        <div class="avatar avatar--md" style="flex-shrink:0">TC</div>
        <div class="sidebar__empresa-info">
          <div class="sidebar__empresa-nombre">TechCorp Argentina</div>
          <div class="sidebar__empresa-rubro">Empresa</div>
        </div>
      </a>

      <nav class="sidebar__nav">
        <span class="sidebar__nav-label">Principal</span>

        <button class="sidebar__link active" onclick="navigateTo('resumen')" title="Resumen">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
          <span class="sidebar__link-text">Resumen</span>
        </button>

        <button class="sidebar__link" onclick="navigateTo('ofertas')" title="Mis ofertas">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="7" width="20" height="14" rx="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
          <span class="sidebar__link-text">Mis ofertas</span>
        </button>

        <button class="sidebar__link" onclick="navigateTo('postulantes')" title="Postulantes">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
          <span class="sidebar__link-text">Postulantes</span>
        </button>

        <button class="sidebar__link" onclick="navigateTo('nueva-oferta')" title="Publicar oferta">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="16"/><line x1="8" y1="12" x2="16" y2="12"/></svg>
          <span class="sidebar__link-text">Publicar oferta</span>
        </button>

        <button class="sidebar__link" onclick="window.location.href='dashboard-candidato.html'" title="Ver todas las ofertas">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
          <span class="sidebar__link-text">Ver todas las ofertas</span>
        </button>

        <span class="sidebar__nav-label">Cuenta</span>

        <button class="sidebar__link" onclick="navigateTo('perfil')" title="Perfil empresa">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          <span class="sidebar__link-text">Perfil empresa</span>
        </button>
      </nav>

    </aside>

    <div class="sidebar-overlay" id="sidebar-overlay"></div>

    <main class="db-main">

      <div class="db-topbar">
        <div style="display:flex;align-items:center;gap:var(--space-3)">
          <button class="sidebar-toggle" id="sidebar-toggle" aria-label="Menu">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <line x1="3" y1="12" x2="21" y2="12"/>
              <line x1="3" y1="6" x2="21" y2="6"/>
              <line x1="3" y1="18" x2="21" y2="18"/>
            </svg>
          </button>
          <span class="db-topbar__title" id="topbar-title">Resumen</span>
        </div>
        <div class="db-topbar__actions relative">
          <!-- Modificado para que el avatar sea un poco más grande (avatar--md) -->
          <button class="avatar avatar--md cursor-pointer" id="topbar-user-btn" aria-haspopup="true" aria-expanded="false" style="border: none; outline: none;">TC</button>

          <div class="user-dropdown" id="topbar-user-dropdown">
            <div class="user-dropdown__header">
              <div class="user-dropdown__name">TechCorp Argentina</div>
              <div class="user-dropdown__email">contacto@techcorp.com</div>
            </div>
            <div class="divider"></div>
            <button class="user-dropdown__item" onclick="navigateTo('perfil')">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
              Perfil Empresa
            </button>
            <button class="user-dropdown__item">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"></path></svg>
              Cambiar tema
            </button>
            <div class="divider"></div>
            <button class="user-dropdown__item text-error" onclick="window.location.href='../index.html'">
              <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
              Cerrar sesión
            </button>
          </div>
        </div>
      </div>

      <div class="db-content" id="db-content"></div>

    </main>

  </div>

  <script src="../../src/utils/geo-api.js"></script>
  <script src="../../src/utils/dashboard-data.js"></script>
  <script src="../../src/js/dashboard/dashboard.js"></script>
  <script src="../../src/js/dashboard/dashboard-sidebar.js"></script>

</body>
</html>
