<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Crear cuenta</title>

    <meta name="google-client-id" content="918106144440-gkli1488vh96c8krpf83v9vo930v605q.apps.googleusercontent.com" />

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:wght@300;400;500;600&family=Roboto+Mono:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <link rel="stylesheet" href="css/base.css?v=1.1" />
    <link rel="stylesheet" href="css/auth.css?v=1.1" />

    <script src="utils/theme.js?v=1.1"></script>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <script src="js/validations.js" defer></script>
  </head>
  <body>
    <main class="auth-page">
      <div class="container container--sm auth-container">
        <section class="auth-card card">
          <header class="auth-header">
            <p class="label">Plataforma</p>
            <h1 class="text-display">Crear cuenta</h1>
            <p class="text-muted">Completá tus datos para registrarte.</p>
          </header>

          <form class="auth-form" id="signupForm" action="#" method="post" novalidate>
            <div class="alert alert--error" id="signupAlert" role="alert" hidden>
              Revisá los campos marcados.
            </div>

            <div class="form-group">
              <fieldset class="form-group role-fieldset">
                <legend class="form-label" id="accountRoleLegend">Tipo de cuenta</legend>

                <div
                  class="role-toggle"
                  id="accountRole"
                  role="radiogroup"
                  aria-labelledby="accountRoleLegend"
                  tabindex="-1"
                >
                  <input
                    class="role-toggle__input"
                    type="radio"
                    id="roleCandidato"
                    name="role"
                    value="candidato"
                    required
                  />
                  <label class="role-toggle__option" for="roleCandidato">
                    <span class="role-toggle__top">
                      <span class="role-toggle__icon" aria-hidden="true">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                          <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2" />
                          <circle cx="12" cy="7" r="4" />
                        </svg>
                      </span>
                      <span class="role-toggle__title">Candidato</span>
                    </span>
                    <span class="role-toggle__desc">Postulate a empleos, armá tu perfil y seguí tus postulaciones.</span>
                  </label>

                  <input
                    class="role-toggle__input"
                    type="radio"
                    id="roleEmpresa"
                    name="role"
                    value="empresa"
                  />
                  <label class="role-toggle__option" for="roleEmpresa">
                    <span class="role-toggle__top">
                      <span class="role-toggle__icon" aria-hidden="true">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                          <rect x="2" y="7" width="20" height="14" rx="2" />
                          <path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16" />
                        </svg>
                      </span>
                      <span class="role-toggle__title">Empresa</span>
                    </span>
                    <span class="role-toggle__desc">Publicá ofertas, revisá postulantes y gestioná entrevistas desde tu dashboard.</span>
                  </label>
                </div>
              </fieldset>
              <p class="form-error" id="accountRoleError" aria-live="polite"></p>
            </div>

            <div class="form-group">
              <label class="form-label" for="fullName" id="fullNameLabel">Nombre completo</label>
              <input
                class="form-input"
                type="text"
                id="fullName"
                name="fullName"
                placeholder="Tu nombre y apellido"
                autocomplete="name"
                required
              />
              <p class="form-error" id="fullNameError" aria-live="polite"></p>
            </div>

            <div class="form-group">
              <label class="form-label" for="email">Correo</label>
              <input
                class="form-input"
                type="email"
                id="email"
                name="email"
                placeholder="tu@correo.com"
                autocomplete="email"
                required
              />
              <p class="form-error" id="emailError" aria-live="polite"></p>
            </div>

            <div class="form-group">
              <label class="form-label" for="password">Contraseña</label>
              <input
                class="form-input"
                type="password"
                id="password"
                name="password"
                placeholder="••••••••"
                autocomplete="new-password"
                minlength="8"
                required
              />
              <p class="form-hint">Usá al menos 8 caracteres.</p>
              <p class="form-error" id="passwordError" aria-live="polite"></p>
            </div>

            <div class="form-group">
              <label class="form-label" for="confirmPassword">Confirmar contraseña</label>
              <input
                class="form-input"
                type="password"
                id="confirmPassword"
                name="confirmPassword"
                placeholder="••••••••"
                autocomplete="new-password"
                minlength="8"
                required
              />
              <p class="form-error" id="confirmPasswordError" aria-live="polite"></p>
            </div>

            <button class="btn btn--primary btn--full" type="submit">Crear cuenta</button>

            <div style="margin-top: var(--space-5)">
              <p class="text-sm text-muted" style="text-align: center; margin-bottom: var(--space-3)">
                o registrate con
              </p>
              <div id="googleSignupButton" style="display: flex; justify-content: center"></div>
              <p class="text-xs text-muted" id="googleSignupHint" style="text-align: center; margin-top: var(--space-2)" hidden>
                Falta configurar el Client ID de Google.
              </p>
            </div>
          </form>

          <footer class="auth-footer">
            <p class="text-sm text-muted">¿Ya tenés cuenta?</p>
            <a class="btn btn--secondary btn--sm" href="login.html">Iniciar sesión</a>
          </footer>

          <div class="mt-4 text-center">
            <a class="text-sm auth-link" href="index.html">Volver al inicio</a>
          </div>
        </section>
      </div>
    </main>
  </body>
</html>
